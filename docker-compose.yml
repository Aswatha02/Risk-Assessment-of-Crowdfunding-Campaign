version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdrisk-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
      - ./trained_models:/trained_models
      - ./data:/data
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost:3000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - crowdrisk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crowdrisk-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - crowdrisk-network
    command: npm run dev -- --host

networks:
  crowdrisk-network:
    driver: bridge

volumes:
  models-data:
  raw-data:
